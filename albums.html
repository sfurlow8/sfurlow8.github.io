<!--this file creates the ipod albums page showing 4 albums 
    with their titles and artist names-->
    <html>
      <head>
          <title>Album Select</title>
          <link rel="stylesheet" type="text/css" href="ipod.css"/>
      </head>
      <body>
          <div id="screen">
                <div class="head-bar">
                      <h1>My Music</h1>
                </div>
                <div class = "albums-album-wrapper"> <!--albums wrapper holds the 4 albums and their corresponding information-->
                  <div>
                      <a href="songs.html" tabindex="1" role="button"> <!--make the image a link to songs-->
                      <img class="albums-album-art" src="images/currents.jpg" alt="Currents album" > <!--alt tag describes link to Currents song page -->
                      </a>
                      <h1 class="albums-album-name">Currents</h1>
                      <p class="albums-artist-name">Tame Impala</p>
                  </div>
                  <div>
                      <img class="albums-album-art" src="images/telefone.jpeg" alt="" > <!--empty alt tag since the image's accompanying text provides the necessary information -->
                      <h1 class="albums-album-name">Telefone</h1>
                      <p class="albums-artist-name">Noname</p>
                  </div>
                  <div>
                      <img class="albums-album-art" src="images/crybaby.jpg" alt="" >
                      <h1 class="albums-album-name">Crybaby</h1>
                      <p class="albums-artist-name"> Melanie Martinez</p>
                  </div>
                  <div >
                      <img class="albums-album-art" src="images/cbook.jpg" alt="" >
                      <h1 class="albums-album-name">Coloring Book</h1>
                      <p class="albums-artist-name">Chance the Rapper</p>
                  </div>
                </div>
                
          </div>
     </body>
  </html>
  <!-- 
  * bg iphone img is 363x762px
  * iphone 'screen' is apprx 300x530 -->
